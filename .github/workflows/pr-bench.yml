name: PR Bench

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Detect team
        id: team
        run: |
          for dir in participants/*/; do
            if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
              TEAM=$(basename "$dir")
              echo "team=$TEAM" >> "$GITHUB_OUTPUT"
              echo "dir=participants/$TEAM" >> "$GITHUB_OUTPUT"
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "Team: $TEAM"
              exit 0
            fi
          done
          echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Install participant
        if: steps.team.outputs.skip != 'true'
        working-directory: ${{ steps.team.outputs.dir }}
        run: |
          rm -f data.db data.db-*
          npm install
          npm run build

      - name: Install bench (Playwright)
        if: steps.team.outputs.skip != 'true'
        working-directory: bench
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Start server
        if: steps.team.outputs.skip != 'true'
        working-directory: ${{ steps.team.outputs.dir }}
        run: |
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health > /dev/null 2>&1 && echo "Server ready" && exit 0
            sleep 1
          done
          echo "::error::Server timeout" && exit 1

      - name: Run benchmark
        if: steps.team.outputs.skip != 'true'
        run: node bench/run.js || true

      - name: Post results
        if: steps.team.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const team = '${{ steps.team.outputs.team }}';

            let results;
            try {
              results = JSON.parse(fs.readFileSync('bench/results.json', 'utf8'));
            } catch {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## ❌ Benchmark falhou -- ${team}\n\nO bench nao conseguiu gerar resultados. Verifique os logs.`
              });
              return;
            }

            const { pass, fail, total } = results.summary;
            const status = fail === 0 ? '✅' : '⚠️';

            function renderCategory(title, items) {
              if (!items || items.length === 0) return '';
              let md = `\n### ${title}\n\n`;
              for (const t of items) {
                const icon = t.ok ? '✅' : '❌';
                md += `- ${icon} ${t.name}`;
                if (t.detail) md += ` *(${t.detail})*`;
                md += '\n';
              }
              return md;
            }

            let body = `## ${status} Resultado -- ${team}\n\n`;
            body += `| Metrica | Valor |\n`;
            body += `|---------|-------|\n`;
            body += `| Testes passando | **${pass}/${total}** |\n`;
            body += `| Testes falhando | **${fail}/${total}** |\n`;
            body += renderCategory('Fase 1: Regras de negocio (API)', results.rules);
            body += renderCategory('Fase 2: Frontend (Playwright)', results.frontend);
            body += renderCategory('Fase 3: Stress test', results.stress);
            body += `\n---\n> 🤖 Bench automatico executado pelo CI\n`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
